name: Pre-push Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "dev/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      # `--ignore-scripts` skips heroui-native-pro / heroui-pro postinstall hooks
      # that fetch private artifacts via HEROUI_AUTH_TOKEN (not in CI). The
      # public npm tarballs include all .d.ts files needed for typecheck/lint/test;
      # binary artifacts only matter at runtime in the actual app.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (all workspaces)
        run: pnpm typecheck

      - name: Lint (all workspaces)
        run: pnpm lint

      # `pnpm test` runs turbo test across all workspaces with a `test` script
      # (currently @arc/core, @arc/ui, @arc/data-sources). New packages that
      # add `test` script will be picked up automatically — no workflow edit.
      - name: Test (all workspaces)
        run: pnpm test

# Revyl CLI Configuration
# Generated by: revyl init
# Edit these settings or run: revyl config set <key> <value>
# Docs: https://docs.revyl.ai/cli/hot-reload

project:
  name: mobile
build:
  system: Expo
  command: npx --yes eas-cli build --platform ios --profile revyl-build --local --output build/app.tar.gz
  output: build/app.tar.gz
  platforms:
    android:
      app_id: eb43e8e7-e41c-466d-b316-907fc115fc4e
      command: npx --yes eas-cli build --platform android --profile revyl-build --local --output build/app.apk
      output: build/app.apk
    ios:
      app_id: 3b442abb-ac2a-44d5-bd1d-9ee7ae3f1e09
      command: npx --yes eas-cli build --platform ios --profile revyl-build --local --output build/app.tar.gz
      output: build/app.tar.gz
defaults:
  open_browser: true
  timeout: 1800
# Dev mode / hot reload configuration
hotreload:
  default: expo
  providers:
    expo:
      # Metro bundler port (default 8081). Change if port conflicts.
      port: 8082
      # URL scheme from app.json or app.config.js (required for Expo deep linking)
      app_scheme: arc
      # Maps platform to build.platforms key for dev build resolution
      platform_keys:
        android: android
        ios: ios

    - type: module_import
      module: arc-bypass-login
    - type: validation
      step_description: The portfolio home shows a total value amount and an area chart below it.
    - type: instructions
      step_description: Press and hold on the area chart, drag horizontally to scrub it, then release.
    - type: instructions
      step_description: Tap each chart time range option (such as 1月, 3月, 1年) one by one, ending back on the default.
